[package]
name = "parser"
version = "1.0.0"
edition = "2024"
rust-version = "1.89"
authors = ["richcar58"]
description = "Parser for SqlExprParser - Generated by CongoCC"
repository = "https://github.com/richcar58/sqlexpr-congo-rust"
readme = "README.md"
license = "MIT"
keywords = ["sql", "expression", "parser", "evaluator", "boolean"]
categories = ["parsing", "parser-implementations"]
exclude = [
    "/docs/*", 
    "/examples/*", 
    "/output/*", 
    "/tests/*", 
    "/.github", 
    "/CLAUDE.md",
    "/RELEASE_NOTES.md",
    "/SqlExprParser.ccc",
]

# Generated parser metadata
[package.metadata.congocc]
grammar_file = "SqlExprParser.ccc"
generated_by = "CongoCC Parser Generator"
parser_class = "Parser"
lexer_class = "Lexer"

[dependencies]
serde = { version = "1.0", features = ["derive"], optional = true }

[dev-dependencies]

[features]
default = []
serde = ["dep:serde"]

[lib]
name = "parser"
path = "src/lib.rs"
